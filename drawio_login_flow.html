        <mxCell id="8" value="POST /api/login&#xa;{username, password}" style="html=1;verticalAlign=bottom;endArrow=block;curved=0;rounded=0;" edge="1" parent="1" source="3" target="4">
          <mxGeometry relative="1" as="geometry">
            <mxPoint x="330" y="240" as="sourcePoint" />

        <mxCell id="9" value="验证用户名密码格式" style="html=1;verticalAlign=bottom;endArrow=block;curved=0;rounded=0;entryX=0.5;entryY=0;" edge="1" parent="1" source="4" target="4">
          <mxGeometry relative="1" as="geometry">
            <mxPoint x="580" y="280" as="sourcePoint" />
            <mxPoint x="630" y="280" as="targetPoint" />

        <mxCell id="10" value="SELECT * FROM users&#xa;WHERE username = ?" style="html=1;verticalAlign=bottom;endArrow=block;curved=0;rounded=0;" edge="1" parent="1" source="4" target="5">
          <mxGeometry relative="1" as="geometry">
            <mxPoint x="580" y="320" as="sourcePoint" />

        <mxCell id="11" value="返回用户信息" style="html=1;verticalAlign=bottom;endArrow=block;curved=0;rounded=0;dashed=1;" edge="1" parent="1" source="5" target="4">
          <mxGeometry relative="1" as="geometry">
            <mxPoint x="830" y="360" as="sourcePoint" />

        <mxCell id="12" value="密码加密比对&#xa;(bcrypt)" style="html=1;verticalAlign=bottom;endArrow=block;curved=0;rounded=0;entryX=0.5;entryY=0;fillColor=#f8cecc;strokeColor=#b85450;" edge="1" parent="1" source="4" target="4">

          <mxGeometry relative="1" as="geometry">

      </root>
    </mxGraphModel>
  </diagram>
</mxfile>`;
        
        function loadDrawio() {
            // 打开Draw.io并加载XML数据
            var drawioUrl = 'http://127.0.0.1:6956/?splash=0&ui=min#' + encodeURIComponent(xmlData);
            window.open(drawioUrl, '_blank');
        }
        
        function copyXML() {
            // 复制XML到剪贴板
            navigator.clipboard.writeText(xmlData).then(function() {
                alert('XML已复制到剪贴板！\n\n请在Draw.io中按Ctrl+V粘贴');
            });
        }
        
        function openDrawio() {
            // 直接打开Draw.io
            window.open('http://127.0.0.1:6956', '_blank');
        }
    </script>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .button {
            display: inline-block;
            background: #4285f4;
            color: white;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        
        .button:hover {
            background: #3367d6;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(66, 133, 244, 0.3);
        }
        
        .button.success {
            background: #34a853;
        }
        
        .button.success:hover {
            background: #2d8e47;
            box-shadow: 0 10px 25px rgba(52, 168, 83, 0.3);
        }
        
        .button.warning {
            background: #fbbc04;
        }
        
        .button.warning:hover {
            background: #f9ab00;
            box-shadow: 0 10px 25px rgba(251, 188, 4, 0.3);
        }
        
        .description {
            color: #666;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .steps {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        
        .steps h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .steps ol {
            color: #666;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Draw.io 登录流程图</h1>
        
        <div class="description">
            <p>在Draw.io中显示完整的登录流程时序图</p>
        </div>
        
        <div class="steps">
            <h3>📋 使用步骤：</h3>
            <ol>
                <li>点击下方按钮打开Draw.io</li>
                <li>在Draw.io中按 <strong>Ctrl+V</strong> 粘贴XML数据</li>
                <li>或者直接点击"自动加载"按钮</li>
                <li>调整布局和样式</li>
                <li>导出为图片</li>
            </ol>
        </div>
        
        <button class="button success" onclick="loadDrawio()">
            🚀 自动加载到Draw.io
        </button>
        
        <button class="button warning" onclick="copyXML()">
            📋 复制XML到剪贴板
        </button>
        
        <button class="button" onclick="openDrawio()">
            🖼️ 打开Draw.io编辑器
        </button>
        
        <div class="description">
            <p><strong>提示：</strong> 如果自动加载失败，请手动复制XML数据到Draw.io中粘贴。</p>
        </div>
    </div>
</body>
</html>
